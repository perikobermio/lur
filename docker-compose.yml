services:
  lur-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
        HTTP_PROXY: ${HTTP_PROXY_URL:-}
        HTTPS_PROXY: ${HTTPS_PROXY_URL:-}
        NO_PROXY: ${NO_PROXY:-}
    container_name: lur-web
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"

  lur-web-prod:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
    container_name: lur-web-prod
    ports:
      - "8090:80"
