services:
  lur-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lur-web
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"

  lur-web-prod:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: lur-web-prod
    ports:
      - "8080:80"
